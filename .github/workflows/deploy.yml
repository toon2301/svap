name: CI

# Produkcia sa nasadzuje cez Railway (auto-deploy z gitu), nie cez tento workflow.
# Tu bežia len build/kontroly – starý legacy deploy krok bol odstránený.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django system checks
      working-directory: ./backend
      run: python manage.py check --settings=swaply.settings
      env:
        DEBUG: 'True'
        SECRET_KEY: ci-check-secret
        SAFESEARCH_ENABLED: 'False'
