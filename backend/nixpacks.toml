# Nixpacks: štart ide cez start.sh a výber runtime riadi APP_SERVER_MODE.
# - APP_SERVER_MODE=all  -> kompatibilný daphne režim (HTTP + WS)
# - APP_SERVER_MODE=http -> gunicorn pre API
# - APP_SERVER_MODE=ws   -> daphne pre WebSockety
[start]
cmd = "./start.sh"

[phases.setup]
aptPkgs = ["libheif-dev", "libde265-dev"]
